seed: 42
device: auto
data:
  train_dir: ./data/train
  test_dir: ./data/test
  image_size: 96
  train_size: 5600
  valid_size: 1400
  num_workers: 4
  pin_memory: true
model:
  name: ResNetLite
  params:
    num_classes: 10
    base_channels: 32
train:
  batch_size: 64
  learning_rate: 0.01
  momentum: 0.9
  weight_decay: 0.0001
  epochs: 30
  use_amp: true
  optimizer: sgd
save:
  output_dir: ./results/exp_b_resnet
  best_model_name: best_model.pth
  loss_curve_name: loss_curve.png
  acc_curve_name: accuracy_curve.png
